<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数字展销平台</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <!-- 头部区域（固定定位+浮动布局，已移除登录/注册） -->
    <header class="header">
        <div class="logo">
            <img src="img/logo.png" alt="新讯图书">
        </div>
        <nav class="nav">
            <a href="#">首页</a>
            <a href="#">图书分类</a>
            <a href="#">热销图书</a>
        </nav>
    </header>

    <!-- 主体三栏布局 -->
    <div class="container">
        <!-- 左侧栏：图书分类（相对定位） -->
        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li>科幻小说</li>
                <li>历史名著</li>
                <li>科技杂志</li>
                <li>艺术图书</li>
                <li>文学作品</li>
            </ul>
        </aside>

        <!-- 中间主内容区 -->
        <main class="main-content">
            <!-- 中间banner图 -->
            <div class="banner">
                <img src="img/banner.jpg" alt="图书借阅系统">
            </div>

            <!-- 新书上市表格 -->
            <table class="book-table">
                <thead>
                    <tr>
                        <th>图书</th>
                        <th>图书名称</th>
                        <th>作者</th>
                        <th>价格</th>
                        <th>库存</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><img src="img/book1.jpg" alt="三体" width="60"></td>
                        <td>三体</td>
                        <td>刘慈欣</td>
                        <td>¥45.00</td>
                        <td>100</td>
                    </tr>
                </tbody>
            </table>
        </main>

        <!-- 右侧栏：新书热销（固定定位） -->
        <aside class="right-sidebar">
            <h3>新书热销</h3>
            <div class="book-card">
                <img src="img/book1.jpg" alt="三体">
                <div class="card-info">《三体》单本</div>
            </div>
            <div class="book-card">
                <img src="img/book2.jpg" alt="三体套装">
                <div class="card-info">《三体》套装</div>
            </div>
        </aside>
    </div>
</body>
</html>
